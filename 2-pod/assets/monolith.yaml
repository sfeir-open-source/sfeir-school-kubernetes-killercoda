apiVersion: v1
kind: Pod
metadata:
  name: busybox
  labels:
    app: busybox
spec:
  containers:
    - name: busybox
      image: busybox:1.37.0
      command:
        - "sh"
        - "-c"
        - "while true; do sleep 6000; done"
      ports:
        - name: http
          containerPort: 80
        - name: health
          containerPort: 81
      resources:
        limits:
          cpu: "100m"
          memory: "10Mi"