apiVersion: v1
kind: Pod
metadata:
  name: "healthy-monolith"
  labels:
    app: monolith
spec:
  containers:
    - name: monolith
      image: ghcr.io/alhossril/monolith:1.0.1
      ports:
        - name: http
          containerPort: 80
      resources:
        limits:
          cpu: 0.05
          memory: "10Mi"
      livenessProbe:
        httpGet:
          path: /health
          port: http
          scheme: HTTP
        initialDelaySeconds: 5
        periodSeconds: 15
        timeoutSeconds: 5
      readinessProbe:
        httpGet:
          path: /
          port: http
          scheme: HTTP
        initialDelaySeconds: 5
        timeoutSeconds: 1